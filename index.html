```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chia tiền điện nước</title>

<style>

body{
font-family: Arial;
background:#f2f4f8;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:30px;
width:600px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

input{
width:100%;
padding:8px;
margin:5px 0 10px 0;
border-radius:5px;
border:1px solid #ccc;
}

.member{
display:grid;
grid-template-columns:2fr 1fr;
gap:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#2d89ef;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th, td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#f0f0f0;
}

.result{
margin-top:20px;
}

</style>

</head>
<body>

<div class="container">

<h1>Chia tiền điện nước</h1>

<label>Tổng tiền điện (VNĐ)</label>
<input type="number" id="electric">

<label>Tổng tiền nước (VNĐ)</label>
<input type="number" id="water">

<h3>Nhập tên và số ngày ở</h3>

<div id="members"></div>

<button onclick="calculate()">Tính tiền</button>

<div class="result" id="result"></div>

</div>


<script>

let membersDiv = document.getElementById("members");

for(let i=1;i<=8;i++){

membersDiv.innerHTML += `
<div class="member">
<input type="text" placeholder="Tên thành viên ${i}" id="name${i}">
<input type="number" placeholder="Ngày ở" id="day${i}">
</div>
`;

}

function calculate(){

let electric = Number(document.getElementById("electric").value);
let water = Number(document.getElementById("water").value);

let total = electric + water;

let totalDays = 0;
let names = [];
let days = [];

for(let i=1;i<=8;i++){

let name = document.getElementById("name"+i).value || "TV"+i;
let day = Number(document.getElementById("day"+i).value);

names.push(name);
days.push(day);

totalDays += day;

}

let html = `
<h3>Tổng tiền: ${total.toLocaleString()} VNĐ</h3>

<table>
<tr>
<th>Thành viên</th>
<th>Ngày ở</th>
<th>Số tiền</th>
</tr>
`;

for(let i=0;i<8;i++){

let pay = (days[i]/totalDays)*total;

html += `
<tr>
<td>${names[i]}</td>
<td>${days[i]}</td>
<td>${pay.toLocaleString()} VNĐ</td>
</tr>
`;

}

html += "</table>";

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
```
