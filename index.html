```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tính Tiền Điện Nước</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:400px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

.result{
    margin-top:20px;
    padding:15px;
    background:#eef2ff;
    border-radius:8px;
}

.member-list{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Tính Tiền Điện Nước (8 người)</h2>

<label>Tiền điện (VND)</label>
<input type="number" id="electric">

<label>Tiền nước (VND)</label>
<input type="number" id="water">

<label>Chi phí khác (internet, rác...)</label>
<input type="number" id="other" value="0">

<button onclick="calculate()">Tính tiền</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let electric = Number(document.getElementById("electric").value);
let water = Number(document.getElementById("water").value);
let other = Number(document.getElementById("other").value);

let total = electric + water + other;
let perPerson = total / 8;

let resultHTML = `
<h3>Tổng chi phí: ${total.toLocaleString()} VND</h3>
<p>Mỗi người phải trả: <b>${perPerson.toLocaleString()} VND</b></p>

<div class="member-list">
<b>Chi tiết 8 thành viên:</b>
<ul>
<li>Thành viên 1: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 2: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 3: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 4: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 5: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 6: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 7: ${perPerson.toLocaleString()} VND</li>
<li>Thành viên 8: ${perPerson.toLocaleString()} VND</li>
</ul>
</div>
`;

document.getElementById("result").innerHTML = resultHTML;

}

</script>

</body>
</html>
```
